<aside class="main-sidebar sidebar-light-primary elevation-4">
    <!-- Brand Logo -->
    <a routerLink="/" class="brand-link">
      <img src="assets/branding/logo-circle.png" alt="Verobits Logo" class="brand-image img-circle elevation-3" style="opacity: .8">
      <span class="brand-text font-weight-light">Express</span>
    </a>
    <div class="sidebar">
      
        <nav class="mt-2">
            <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
               <ng-container *ngFor="let item of menuItems">
                  <li class="nav-item" [class.menu-open]="item.isOpen">
                    <a href="#" 
                      class="nav-link" 
                      [class.active]="item.isActive"
                      (click)="toggleMenuItem(item); $event.preventDefault()">
                      <i class="nav-icon" [class]="item.icon"></i>
                      <p>
                        {{ item.label }}
                        <i class="right fas fa-angle-left" *ngIf="item.children"></i>
                        <span *ngIf="item.badge" class="right badge" [class]="item.badge.class">{{ item.badge.text }}</span>
                      </p>
                      </a>
              
                       <!-- Submenu -->
                      <ul class="nav nav-treeview" *ngIf="item.children && item.isOpen">
                        <li class="nav-item" *ngFor="let child of item.children">
                          <a [routerLink]="child.route" 
                            class="nav-link" 
                            [class.active]="child.isActive"
                            (click)="setActiveItem(child)">
                            <i class="nav-icon" [class]="child.icon"></i>
                            <p>{{ child.label }}</p>
                          </a>
                        </li>
                      </ul>
                    </li>
        </ng-container>
